# Battery reporting for the split halves
CONFIG_ZMK_BATTERY_REPORTING=y

# Deep sleep after 30 minutes idle to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Increase BLE TX power for a more reliable central/peripheral link.
# This helps with the right-half lag if it is caused by a weak connection.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

